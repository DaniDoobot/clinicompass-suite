services:
  clinicompass-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
    container_name: clinicompass-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    labels:
      - traefik.enable=true

      - traefik.http.routers.clinicompass-web.rule=Host(`crmdemo.doobot.ai`)
      - traefik.http.routers.clinicompass-web.entrypoints=web
      - traefik.http.routers.clinicompass-web.middlewares=clinicompass-redirect

      - traefik.http.middlewares.clinicompass-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.clinicompass-redirect.redirectscheme.permanent=true

      - traefik.http.routers.clinicompass-websecure.rule=Host(`crmdemo.doobot.ai`)
      - traefik.http.routers.clinicompass-websecure.entrypoints=websecure
      - traefik.http.routers.clinicompass-websecure.tls=true
      - traefik.http.routers.clinicompass-websecure.tls.certresolver=letsencrypt

      - traefik.http.services.clinicompass.loadbalancer.server.port=80
      - traefik.docker.network=dokploy-network

    networks:
      - default
      - dokploy-network

networks:
  dokploy-network:
    external: true
